<style>
  .botones-container {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-top: 20px;
  }
  
  .btn-interactivo {
    padding: 8px 16px;
    border: none;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  
  #like-btn {
    background-color: #ffebee;
    color: #c62828;
  }
  
  #like-btn:disabled {
    opacity: 0.7;
    cursor: default;
  }
  
  .contador {
    font-size: 14px;
    color: #555;
  }
  
  .introspectivo {
    position: relative;
    background: linear-gradient(145deg, #f5f5f5, #e0e0e0);
    color: #2e7d32;
    padding: 8px 20px 8px 15px;
    overflow: hidden;
  }
  
  .introspectivo .icono {
    transition: all 0.5s ease;
  }
  
  .introspectivo:hover {
    background: linear-gradient(145deg, #e8f5e9, #c8e6c9);
    animation: vibracion-sutil 0.3s linear;
  }
  
  .introspectivo:hover .icono {
    transform: rotate(10deg) scale(1.2);
  }
  
  .introspectivo:active {
    transform: scale(0.98);
  }
  
  @keyframes vibracion-sutil {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-1px); }
    75% { transform: translateX(1px); }
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const CSV_URL = "https://raw.githubusercontent.com/burdier/burdier.github.io/master/assets/frases_neutras.csv";
    const randomId = Math.floor(Math.random() * 500) + 1;

    const fraseTexto = document.getElementById("frase-texto");
    const likeBtn = document.getElementById("like-btn");
    const likeCount = document.getElementById("like-count");
    const seguirBtn = document.getElementById("seguir-btn");

    const likeKey = `like_frase_${randomId}`;

    fetch(CSV_URL)
      .then(response => response.text())
      .then(csv => {
        const lines = csv.trim().split("\n").slice(1);
        const fraseLine = lines[randomId - 1];
        if (!fraseLine) return;
        const [id, text, likes] = fraseLine.split(",");

        fraseTexto.textContent = text;
        let currentLikes = parseInt(localStorage.getItem(likeKey) || likes);
        likeCount.textContent = `${currentLikes} ❤️`;

        likeBtn.addEventListener("click", () => {
          currentLikes += 1;
          localStorage.setItem(likeKey, currentLikes);
          likeCount.textContent = `${currentLikes} ❤️`;
          likeBtn.disabled = true;
          likeBtn.style.transform = "scale(1.1)";
          setTimeout(() => { likeBtn.style.transform = "scale(1)"; }, 200);
        });

        seguirBtn.addEventListener("click", () => {
          // Efecto visual al hacer clic
          seguirBtn.style.animation = "none";
          setTimeout(() => {
            seguirBtn.style.animation = "vibracion-sutil 0.4s linear";
          }, 10);
          
          // Mensaje introspectivo
          const mensajes = [
            "La reflexión continúa...",
            "Profundizando...",
            "Explorando ideas...",
            "Siguiendo el hilo...",
            "Pensamiento en progreso..."
          ];
          const randomMsg = mensajes[Math.floor(Math.random() * mensajes.length)];
          seguirBtn.querySelector(".texto").textContent = randomMsg;
          
          // Recargar nueva frase después de 1.5 segundos
          setTimeout(() => {
            location.reload();
          }, 1500);
        });
      })
      .catch(err => {
        fraseTexto.textContent = "No se pudo cargar la frase.";
        console.error(err);
      });
  });
</script>

<div id="plugin-menu" class="hidden">
  <strong>Herramientas:</strong>
  <ul id="plugin-list"></ul>
</div>
<script>
  const STORAGE_KEY = "don3b_plugins";

  // Paso 1: inicializar plugins en localStorage (si no existen)
  if (!localStorage.getItem(STORAGE_KEY)) {
    const initialPlugins = [
      {
        folder: "speech_plugin",
        entry: "plugins/speech_plugin/index.html",
        config: "plugins/speech_plugin/config.js"
      }
    ];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(initialPlugins));
  }

  const pluginList = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  const pluginListEl = document.getElementById("plugin-list");
  const menuEl = document.getElementById("plugin-menu");
  const btnEl = document.getElementById("hub-button");

  // Mostrar/ocultar menú al hacer click
  btnEl.addEventListener("click", () => {
    menuEl.classList.toggle("hidden");
  });

  // Paso 2: cargar la metadata de cada plugin (config.js)
  pluginList.forEach(plugin => {
    const script = document.createElement("script");
    script.src = plugin.config;
    script.onload = () => {
      const config = window.pluginConfig;
      if (!config || !config.name) return;

      const li = document.createElement("li");
      li.textContent = config.name;
      li.addEventListener("click", () => launchPlugin(config, plugin.entry));
      pluginListEl.appendChild(li);
    };
    document.body.appendChild(script);
  });

  // Paso 3: función para lanzar el plugin
  async function launchPlugin(config, entryUrl) {
    if (config.permissions?.includes("microphone")) {
      try {
        await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch {
        alert("Este plugin requiere acceso al micrófono.");
        return;
      }
    }

    if (config.type === "repo-html") {
      fetch(entryUrl)
        .then(res => res.text())
        .then(html => showPluginHTML(html));
    }
  }

  // Mostrar HTML del plugin dentro de overlay
  function showPluginHTML(htmlContent) {
    const overlay = createOverlay();
    const container = document.createElement("div");
    container.innerHTML = htmlContent;
    container.style.cssText = `
      position: fixed;
      top: 5%;
      left: 5%;
      width: 90%;
      height: 90%;
      background: white;
      overflow: auto;
      z-index: 1001;
      padding: 10px;
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(0,0,0,0.4);
    `;
    overlay.appendChild(container);
  }

  // Crear overlay oscuro
  function createOverlay() {
    let existing = document.getElementById("plugin-overlay");
    if (existing) existing.remove();

    const overlay = document.createElement("div");
    overlay.id = "plugin-overlay";
    overlay.style.cssText = `
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
    `;
    overlay.addEventListener("click", () => overlay.remove());
    document.body.appendChild(overlay);
    return overlay;
  }
</script>
