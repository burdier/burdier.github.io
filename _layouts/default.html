<!-- Botón flotante para abrir menú -->
<button id="hub-button">⚙️ Don3b Tools</button>

<!-- Menú flotante con lista de plugins -->
<div id="plugin-menu" class="hidden">
  <strong>Herramientas:</strong>
  <ul id="plugin-list"></ul>
</div>

<!-- Overlay para mostrar plugin dinámico -->
<div id="plugin-overlay" style="display:none;"></div>

<script>
  const STORAGE_KEY = "don3b_plugins";

  // Plugins iniciales (si no hay en localStorage)
  if (!localStorage.getItem(STORAGE_KEY)) {
    const initialPlugins = [
      {
        folder: "speech_plugin",
        entry: "plugins/speech_plugin/index.html",
        config: "plugins/speech_plugin/config.js"
      }
    ];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(initialPlugins));
  }

  const pluginList = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  const pluginListEl = document.getElementById("plugin-list");
  const menuEl = document.getElementById("plugin-menu");
  const btnEl = document.getElementById("hub-button");

  btnEl.addEventListener("click", () => {
    menuEl.classList.toggle("hidden");
  });

  pluginList.forEach(plugin => {
    const script = document.createElement("script");
    script.src = plugin.config;
    script.onload = () => {
      const config = window.pluginConfig;
      if (!config || !config.name) return;

      const li = document.createElement("li");
      li.textContent = config.name;
      li.addEventListener("click", () => launchPlugin(config, plugin.entry));
      pluginListEl.appendChild(li);
    };
    document.body.appendChild(script);
  });

  async function launchPlugin(config, entryUrl) {
    if (config.permissions?.includes("microphone")) {
      try {
        await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch {
        alert("Este plugin requiere acceso al micrófono.");
        return;
      }
    }

    showPluginIframe(entryUrl);
  }

  function showPluginIframe(url) {
    const overlay = document.getElementById("plugin-overlay");
    overlay.innerHTML = `
      <div style="
        position: fixed;
        top: 5%;
        left: 5%;
        width: 90%;
        height: 90%;
        background: white;
        border-radius: 12px;
        box-shadow: 0 0 30px rgba(0,0,0,0.4);
        overflow: hidden;
      ">
        <iframe src="${url}" frameborder="0" style="width:100%; height:100%; border:none;"></iframe>
      </div>
    `;
    overlay.style.display = "block";

    // Cierra al hacer clic afuera del contenido
    overlay.addEventListener("click", function (e) {
      if (e.target === overlay) {
        overlay.style.display = "none";
        overlay.innerHTML = "";
      }
    });
  }
</script>

<style>
  #hub-button {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #000;
    color: #fff;
    border-radius: 999px;
    padding: 12px 18px;
    z-index: 1000;
    border: none;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
  }

  #plugin-menu {
    position: fixed;
    bottom: 70px;
    right: 20px;
    background: white;
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    z-index: 1000;
    min-width: 200px;
  }

  #plugin-menu.hidden {
    display: none;
  }

  #plugin-menu ul {
    list-style: none;
    margin: 0;
    padding: 0;
  }

  #plugin-menu li {
    padding: 8px 10px;
    cursor: pointer;
    border-radius: 6px;
  }

  #plugin-menu li:hover {
    background: #f0f0f0;
  }

  #plugin-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 1000;
  }
</style>
